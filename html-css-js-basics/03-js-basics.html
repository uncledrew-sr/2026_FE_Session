<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript 기본 문법</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 0 16px;
      }
      .box {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 14px;
      }
      button {
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        background: #0ea5e9;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>JavaScript 기초 연습</h1>

    <div class="box">
      <h2>1) 버튼 클릭 이벤트</h2>
      <p id="click-result">아직 버튼을 누르지 않았어요.</p>
      <button id="click-btn">클릭하기</button>
    </div>

    <div class="box">
      <h2>2) 입력값으로 조건문 실행</h2>
      <input id="age-input" type="number" placeholder="나이를 입력하세요" />
      <button id="check-btn">확인</button>
      <p id="age-result"></p>
    </div>

    <!-- 외부 JS 파일 연결 -->
    <script src="./assets/script-basics.js"></script>
  </body>
</html>
